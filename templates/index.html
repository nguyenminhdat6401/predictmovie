<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Fate Forecaster  🎬🔮</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
        h1 {
            text-align: center;
            color: #f5f5f5;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #e94560;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #222;
            color: white;
            font-size: 16px;
        }
        button {
            background: linear-gradient(45deg, #e94560, #ff6b6b);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }
        #result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        .good {
            background: linear-gradient(135deg, rgba(46, 213, 115, 0.2), rgba(32, 178, 170, 0.2));
            border-left: 5px solid #2ed573;
        }
        .bad {
            background: linear-gradient(135deg, rgba(255, 71, 87, 0.2), rgba(255, 107, 107, 0.2));
            border-left: 5px solid #ff4757;
        }
        .result-title {
            font-size: 24px;
            margin-bottom: 15px;
            text-align: center;
        }
        .result-points {
            list-style-type: none;
            padding: 0;
        }
        .result-points li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .good-point {
            color: #2ed573;
        }
        .bad-point {
            color: #ff4757;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dự đoán phim 🔮</h1>
        
        <form id="movieForm">
            <div class="form-group">
                <label for="movieTitle">Tên Phim</label>
                <input type="text" id="movieTitle" required>
            </div>
            
            <div class="form-group">
                <label for="releaseYear">Năm Phát Hành</label>
                <input type="number" id="releaseYear" min="1900" max="2099" required>
            </div>
            
            <div class="form-group">
                <label for="runtime">Thời lượng phim (phút)</label>
                <input type="number" id="runtime" min="1" required>
            </div>
            
            <div class="form-group">
                <label for="language">Ngôn Ngữ</label>
                <select id="language" required>
                    <option value="">Chọn Ngôn Ngữ</option>
                    <option value="english">English</option>
                    <option value="spanish">Spanish</option>
                    <option value="french">French</option>
                    <option value="german">German</option>
                    <option value="japanese">Japanese</option>
                    <option value="korean">Korean</option>
                    <option value="hindi">Hindi</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="genre">Thể Loại</label>
                <select id="genre" required>
                    <option value="">Chọn Thể Loại</option>
                    <option value="action">Action</option>
                    <option value="comedy">Comedy</option>
                    <option value="drama">Drama</option>
                    <option value="horror">Horror</option>
                    <option value="scifi">Sci-Fi</option>
                    <option value="romance">Romance</option>
                    <option value="thriller">Thriller</option>
                    <option value="animation">Animation</option>
                </select>
            </div>
            
            <button type="submit">Dự Đoán</button>
        </form>
        
        <div id="result">
            <h2 class="result-title" id="resultTitle"></h2>
            <ul class="result-points" id="resultPoints"></ul>
        </div>
    </div>

<script>
document.getElementById('movieForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const title = document.getElementById('movieTitle').value; // chỉ để hiển thị
    const year = document.getElementById('releaseYear').value;
    const runtime = document.getElementById('runtime').value;

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            title: title,
            year: year,
            runtime: runtime
        })
    })
    .then(res => res.json())
    .then(data => {
        const resultDiv = document.getElementById('result');
        const resultTitle = document.getElementById('resultTitle');
        const resultPoints = document.getElementById('resultPoints');

        resultPoints.innerHTML = '';

        if (data.prediction === "Phim hay") {
            resultDiv.className = 'good';
            resultTitle.textContent = `"${title}" Tuyệt vời! 🎉`;
            resultTitle.className = 'result-title good-point';
            const li = document.createElement('li');
            li.className = 'good-point';
            li.textContent = `Dự đoán phim này hay`;
            resultPoints.appendChild(li);
        } else {
            resultDiv.className = 'bad';
            resultTitle.textContent = `"${title}" HAHAHA phim không hay rồi! 😂`;
            resultTitle.className = 'result-title bad-point';
            const li = document.createElement('li');
            li.className = 'bad-point';
            li.textContent = `Dự đoán phim này tệ`;
            resultPoints.appendChild(li);
        }

        resultDiv.style.display = 'block';
        resultDiv.scrollIntoView({ behavior: 'smooth' });
    });
});
</script>

</body>
</html>
